name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      showcase: ${{ steps.filter.outputs.showcase }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            showcase:
              - "showcase/**"

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dependencies
        run: uv sync

      - name: pytest
        run: uv run pytest

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy

  showcase:
    name: Showcase
    needs: changes
    if: needs.changes.outputs.showcase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            showcase/site/package-lock.json

      - name: Install root workspace
        run: npm ci

      - name: Install showcase site
        run: npm ci --prefix showcase/site

      - name: Lint
        run: npm run showcase:lint

      - name: Test
        run: npm run showcase:test

      - name: Build
        run: npm run showcase:build
