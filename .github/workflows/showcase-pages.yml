name: Showcase Workers

on:
  push:
    branches: [main]
    paths:
      - "showcase/**"

concurrency:
  group: showcase-workers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            showcase/site/package-lock.json

      - name: Install root workspace
        run: npm ci

      - name: Install showcase site
        run: npm ci --prefix showcase/site

      - name: Lint
        run: npm run showcase:lint

      - name: Test
        run: npm run showcase:test

      - name: Build
        run: npm run showcase:build

      - name: Assert production headers in dist
        run: test -f showcase/site/dist/_headers

      # Frozen Showcase Web export: sync R2 on production, then strip from
      # Worker assets. Live /game/* is served from bucket fido-showcase-game.
      - name: Sync game/ to R2
        working-directory: showcase/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run sync:game

      - name: Strip game/ from dist
        working-directory: showcase/site
        run: npm run strip:game

      - name: Assert game excluded from Worker assets
        run: |
          test -f showcase/site/dist/_headers
          test ! -e showcase/site/dist/game

      - name: Deploy Worker (production)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: showcase/site
          command: deploy
